# =============================
# 🧊 Glass Effect
# =============================
background_opacity 0.80

# =============================
# 🎨 Font
# =============================
font_family MesloLGS Nerd Font
font_size 13.0

# =============================
# 🧼 Clean UI
# =============================
window_padding_width 10
enable_audio_bell no

# =============================
# ⚡ Cursor
# =============================
cursor_shape block
cursor_blink_interval 0.5

# =============================
# 🌈 Colors
# =============================
foreground #f8f8f2
background #1e1e2e

selection_background #44475a
selection_foreground #ffffff

# =============================
# 🖥️ Display
# =============================
linux_display_server x11

# =============================
# 🔲 Fullscreen
# =============================
map f11 toggle_fullscreen

# =============================
# 🧠 Layouts
# =============================
enabled_layouts tall,fat,grid

# =============================
# 🎯 Split controls
# =============================
map ctrl+shift+enter launch --location=split

# =============================
# 🔄 Layout switching
# =============================
map ctrl+shift+1 goto_layout tall
map ctrl+shift+2 goto_layout fat
map ctrl+shift+3 goto_layout grid

# =============================
# 🧭 Pane navigation
# =============================
map ctrl+shift+right next_window
map ctrl+shift+left previous_window

# =============================
# 🔧 Resize panes
# =============================
map ctrl+shift+l resize_window wider 5
map ctrl+shift+h resize_window narrower 5
map ctrl+shift+k resize_window taller 5
map ctrl+shift+j resize_window shorter 5

# =============================
# ❌ Close pane
# =============================
map ctrl+shift+w close_window

# =============================
# 🎨 Borders
# =============================
active_border_color #89b4fa
inactive_border_color #313244

# =============================
# 🖱️ Mouse
# =============================
mouse_hide_wait 2.0

# =============================
# ⚙️ Remote control
# =============================
allow_remote_control yes
listen_on unix:/tmp/kitty

# =============================
# 🚀 UX improvements
# =============================
confirm_os_window_close 0


# Number of past cursor positions to trail (visual effect)
cursor_trail 3

# How quickly cursor trail fades (start_opacity end_opacity)
cursor_trail_decay 0.1 0.4
